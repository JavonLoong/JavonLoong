<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>回声计划 PPT 预览 | JavonLoong</title>
  <style>
    :root {
      --ink: #18201d;
      --muted: #68746f;
      --paper: #f5f3ee;
      --line: #d8d7ce;
      --accent: #20584f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
    }

    main {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 42px 0 56px;
    }

    header {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24px;
      align-items: end;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--line);
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", "SimSun", serif;
      font-size: clamp(36px, 7vw, 86px);
      line-height: 0.95;
      font-weight: 500;
      letter-spacing: 0;
    }

    .meta {
      max-width: 320px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
      text-align: right;
    }

    .slides {
      display: grid;
      gap: 22px;
      margin-top: 30px;
    }

    figure {
      margin: 0;
      padding: 14px;
      background: #fff;
      border: 1px solid var(--line);
    }

    img {
      display: block;
      width: 100%;
      height: auto;
      background: #fff;
    }

    figcaption {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    @media (max-width: 720px) {
      header {
        grid-template-columns: 1fr;
      }

      .meta {
        max-width: none;
        text-align: left;
      }

      main {
        width: min(100% - 20px, 1180px);
        padding-top: 26px;
      }

      figure {
        padding: 8px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <p class="eyebrow">PPT Preview</p>
        <h1>回声计划</h1>
      </div>
      <p class="meta">一组以“听障儿童语言支持”为主题的汇报型 PPT，重点展示资料整理、视觉重绘和版式控制。</p>
    </header>
    <section class="slides" aria-label="回声计划 PPT 页面预览"></section>
  </main>
  <script>
    const slides = Array.from({ length: 10 }, (_, index) => `slides/slide-${String(index + 1).padStart(2, "0")}.jpg`);
    document.querySelector(".slides").innerHTML = slides.map((src, index) => `
      <figure>
        <img src="${src}" alt="回声计划 PPT 第 ${index + 1} 页" loading="${index < 2 ? "eager" : "lazy"}">
        <figcaption>Slide ${String(index + 1).padStart(2, "0")}</figcaption>
      </figure>
    `).join("");
  </script>
</body>
</html>
