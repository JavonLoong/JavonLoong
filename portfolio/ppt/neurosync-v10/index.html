<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NeuroSync PPT 预览 | JavonLoong</title>
  <style>
    :root {
      --ink: #161918;
      --muted: #6c7370;
      --paper: #f2f3f1;
      --line: #d8ddd9;
      --accent: #8f2f2f;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--paper);
      color: var(--ink);
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
    }

    main {
      width: min(1280px, calc(100% - 32px));
      margin: 0 auto;
      padding: 42px 0 56px;
    }

    header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 32px;
      align-items: end;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--line);
    }

    .eyebrow {
      margin: 0 0 8px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", "SimSun", serif;
      font-size: clamp(36px, 8vw, 92px);
      line-height: 0.95;
      font-weight: 500;
      letter-spacing: 0;
    }

    .meta {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.8;
    }

    .slides {
      display: grid;
      gap: 24px;
      margin-top: 30px;
    }

    figure {
      margin: 0;
      padding: 14px;
      background: #fff;
      border: 1px solid var(--line);
    }

    img {
      display: block;
      width: 100%;
      height: auto;
      background: #fff;
    }

    figcaption {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    @media (max-width: 760px) {
      header {
        grid-template-columns: 1fr;
      }

      main {
        width: min(100% - 20px, 1280px);
        padding-top: 26px;
      }

      figure {
        padding: 8px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <p class="eyebrow">PPT Preview</p>
        <h1>NeuroSync</h1>
      </div>
      <p class="meta">一组围绕智能康复与训练状态识别的产品型 PPT，重点展示技术叙事、主视觉生成和页面统一性。</p>
    </header>
    <section class="slides" aria-label="NeuroSync PPT 页面预览"></section>
  </main>
  <script>
    const slides = Array.from({ length: 16 }, (_, index) => `slides/slide-${String(index + 1).padStart(2, "0")}.jpg`);
    document.querySelector(".slides").innerHTML = slides.map((src, index) => `
      <figure>
        <img src="${src}" alt="NeuroSync PPT 第 ${index + 1} 页" loading="${index < 2 ? "eager" : "lazy"}">
        <figcaption>Slide ${String(index + 1).padStart(2, "0")}</figcaption>
      </figure>
    `).join("");
  </script>
</body>
</html>
