<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Variant 04 | Graphic Designer Portfolio</title>
  <meta name="description" content="纪文龙 Variant 04：Graphic Designer Portfolio 风格的简历与作品集页面。">
  <style>
    :root {
      --ink: #111;
      --paper: #f4f0e8;
      --white: #fffdf7;
      --muted: #6a6258;
      --red: #f0442e;
      --blue: #2457ff;
      --lime: #c9f13a;
      --sand: #d8c7aa;
      --line: rgba(17, 17, 17, .16);
      --radius: 6px;
      --max: 1280px;
    }

    * { box-sizing: border-box; }

    html {
      max-width: 100%;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      max-width: 100%;
      overflow-x: hidden;
      color: var(--ink);
      background:
        linear-gradient(90deg, var(--line) 1px, transparent 1px) 0 0 / 28px 28px,
        linear-gradient(0deg, rgba(17, 17, 17, .1) 1px, transparent 1px) 0 0 / 28px 28px,
        var(--paper);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      line-height: 1.5;
      letter-spacing: 0;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 80;
      pointer-events: none;
      background:
        repeating-linear-gradient(90deg, rgba(17, 17, 17, .025) 0 1px, transparent 1px 5px),
        repeating-linear-gradient(0deg, rgba(17, 17, 17, .018) 0 1px, transparent 1px 7px);
      mix-blend-mode: multiply;
    }

    a { color: inherit; text-decoration: none; }
    a:focus-visible { outline: 3px solid var(--blue); outline-offset: 3px; }

    .page {
      width: min(var(--max), calc(100% - 28px));
      margin: 0 auto;
      padding: 14px 0 56px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 40;
      display: grid;
      grid-template-columns: minmax(220px, .72fr) minmax(0, 1.28fr);
      border: 3px solid var(--ink);
      background: var(--white);
      box-shadow: 0 8px 0 rgba(17, 17, 17, .08);
    }

    .brand-link {
      display: grid;
      grid-template-columns: 64px minmax(0, 1fr);
      min-width: 0;
      border-right: 3px solid var(--ink);
      background: var(--ink);
      color: var(--white);
    }

    .brand-link b {
      display: grid;
      place-items: center;
      border-right: 3px solid var(--white);
      background: var(--red);
      font-size: 1.55rem;
      line-height: 1;
      font-weight: 950;
    }

    .brand-link span {
      display: flex;
      align-items: center;
      min-width: 0;
      padding: 0 16px;
      font-size: .82rem;
      font-weight: 900;
      text-transform: uppercase;
      overflow-wrap: anywhere;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      align-items: stretch;
      justify-content: flex-end;
      min-width: 0;
    }

    .nav a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 58px;
      min-width: 72px;
      padding: 0 12px;
      border-left: 2px solid var(--ink);
      font-size: .76rem;
      font-weight: 950;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .nav a:hover,
    .nav a[aria-current="page"] { background: var(--lime); }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(320px, .9fr);
      gap: 18px;
      min-height: 720px;
      padding-top: 18px;
    }

    .hero-poster,
    .identity-board,
    .section,
    .case-card {
      border: 3px solid var(--ink);
      background: var(--white);
    }

    .hero-poster {
      position: relative;
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-width: 0;
      overflow: hidden;
    }

    .hero-poster::before {
      content: "";
      position: absolute;
      inset: 34px 34px auto auto;
      width: 220px;
      height: 150px;
      border: 3px solid var(--ink);
      background:
        repeating-linear-gradient(90deg, var(--ink) 0 10px, transparent 10px 18px),
        var(--lime);
      transform: rotate(-6deg);
    }

    .edition-row {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 124px minmax(0, 1fr);
      border-bottom: 3px solid var(--ink);
    }

    .edition-row span {
      min-width: 0;
      padding: 13px 16px;
      font-size: .84rem;
      font-weight: 950;
      text-transform: uppercase;
      overflow-wrap: anywhere;
    }

    .edition-row span:first-child {
      border-right: 3px solid var(--ink);
      background: var(--blue);
      color: var(--white);
    }

    .hero-copy {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-width: 0;
      padding: 42px;
    }

    .eyebrow,
    .hero-actions,
    .tag-row,
    .link-row,
    .case-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .eyebrow { margin-bottom: 26px; }

    .chip,
    .tag,
    .case-link {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      max-width: 100%;
      border: 2px solid currentColor;
      border-radius: var(--radius);
      padding: 0 9px;
      font-size: .72rem;
      font-weight: 950;
      text-transform: uppercase;
      overflow-wrap: anywhere;
    }

    .chip { background: var(--paper); }
    .chip.dark { background: var(--ink); color: var(--white); }
    .chip.red { background: var(--red); color: var(--white); }

    .display-title {
      margin: 0;
      max-width: 980px;
      font-size: 7.8rem;
      line-height: .82;
      letter-spacing: 0;
      text-transform: uppercase;
      overflow-wrap: anywhere;
    }

    .display-title .outline {
      display: block;
      color: var(--white);
      -webkit-text-stroke: 2px var(--ink);
      text-shadow: 8px 8px 0 var(--red);
    }

    .statement {
      width: min(760px, 100%);
      margin: 34px 0 0;
      border-left: 8px solid var(--ink);
      padding-left: 18px;
      color: #2f2b25;
      font-size: 1.18rem;
      font-weight: 720;
      overflow-wrap: anywhere;
    }

    .hero-actions { margin-top: 32px; }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      border: 3px solid var(--ink);
      border-radius: var(--radius);
      background: var(--white);
      box-shadow: 5px 5px 0 var(--ink);
      padding: 0 15px;
      font-size: .82rem;
      font-weight: 950;
      text-transform: uppercase;
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .button:hover {
      transform: translate(3px, 3px);
      box-shadow: 2px 2px 0 var(--ink);
      background: var(--lime);
    }

    .button.primary { background: var(--red); color: var(--white); }
    .button.primary:hover { background: var(--blue); }

    .metric-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      border-top: 3px solid var(--ink);
      background: var(--ink);
      color: var(--white);
    }

    .metric {
      min-width: 0;
      min-height: 114px;
      padding: 14px;
      border-right: 2px solid var(--white);
    }

    .metric:last-child { border-right: 0; }
    .metric b { display: block; font-size: 2rem; line-height: 1; font-weight: 950; overflow-wrap: anywhere; }
    .metric span { display: block; margin-top: 9px; color: rgba(255, 253, 247, .76); font-size: .8rem; font-weight: 780; overflow-wrap: anywhere; }

    .identity-board {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-width: 0;
      overflow: hidden;
    }

    .identity-top {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 3px solid var(--ink);
    }

    .identity-top div {
      min-height: 132px;
      padding: 18px;
      border-right: 3px solid var(--ink);
      background: var(--sand);
    }

    .identity-top div:last-child {
      border-right: 0;
      background: var(--lime);
    }

    .identity-top small,
    .identity-system small,
    .section-kicker {
      display: block;
      color: var(--muted);
      font-size: .72rem;
      font-weight: 950;
      text-transform: uppercase;
    }

    .identity-top strong {
      display: block;
      margin-top: 22px;
      font-size: 1.35rem;
      line-height: 1.02;
      font-weight: 950;
      overflow-wrap: anywhere;
    }

    .identity-system {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-width: 0;
      padding: 24px;
      background:
        linear-gradient(90deg, transparent 0 calc(50% - 1px), var(--ink) calc(50% - 1px) calc(50% + 1px), transparent calc(50% + 1px)),
        linear-gradient(0deg, transparent 0 calc(50% - 1px), var(--ink) calc(50% - 1px) calc(50% + 1px), transparent calc(50% + 1px)),
        var(--white);
    }

    .monogram {
      display: grid;
      grid-template-columns: 1fr 1fr;
      width: min(100%, 440px);
      min-height: 330px;
      margin: auto;
      border: 3px solid var(--ink);
      background: var(--paper);
      box-shadow: 14px 14px 0 var(--blue);
      transform: rotate(-2deg);
    }

    .monogram span {
      display: grid;
      place-items: center;
      border-right: 3px solid var(--ink);
      font-size: 8rem;
      line-height: .8;
      font-weight: 950;
      text-transform: uppercase;
    }

    .monogram span:last-child {
      border-right: 0;
      background: var(--red);
      color: var(--white);
    }

    .identity-caption {
      margin: 28px 0 0;
      border-top: 3px solid var(--ink);
      padding-top: 16px;
      font-size: 1.02rem;
      font-weight: 760;
      overflow-wrap: anywhere;
    }

    .palette {
      display: grid;
      grid-template-columns: 1.1fr .7fr .45fr 1fr;
      min-height: 70px;
      border-top: 3px solid var(--ink);
    }

    .palette span { display: block; border-right: 3px solid var(--ink); }
    .palette span:last-child { border-right: 0; }
    .palette span:nth-child(1) { background: var(--ink); }
    .palette span:nth-child(2) { background: var(--red); }
    .palette span:nth-child(3) { background: var(--blue); }
    .palette span:nth-child(4) { background: var(--lime); }

    .section {
      margin-top: 18px;
      overflow: hidden;
    }

    .section-head {
      display: grid;
      grid-template-columns: 156px minmax(0, 1fr) minmax(250px, .44fr);
      border-bottom: 3px solid var(--ink);
    }

    .section-no {
      display: grid;
      place-items: center;
      min-height: 142px;
      border-right: 3px solid var(--ink);
      background: var(--ink);
      color: var(--white);
      font-size: 3.8rem;
      line-height: 1;
      font-weight: 950;
    }

    .section-title {
      min-width: 0;
      padding: 24px;
    }

    .section-title h2 {
      margin: 8px 0 0;
      font-size: 4.4rem;
      line-height: .88;
      letter-spacing: 0;
      text-transform: uppercase;
      overflow-wrap: anywhere;
    }

    .section-note {
      display: flex;
      align-items: flex-end;
      min-width: 0;
      border-left: 3px solid var(--ink);
      background: var(--paper);
      padding: 22px;
      color: #3d372f;
      font-weight: 760;
      overflow-wrap: anywhere;
    }

    .capability-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      border-bottom: 3px solid var(--ink);
    }

    .ability {
      min-width: 0;
      min-height: 190px;
      padding: 18px;
      border-right: 3px solid var(--ink);
      background: var(--white);
    }

    .ability:nth-child(2) { background: var(--lime); }
    .ability:nth-child(3) { background: var(--blue); color: var(--white); }
    .ability:nth-child(4) { border-right: 0; background: var(--red); color: var(--white); }
    .ability b { display: block; font-size: 2.65rem; line-height: 1; font-weight: 950; }
    .ability strong { display: block; margin-top: 20px; font-size: 1.15rem; line-height: 1.12; font-weight: 950; overflow-wrap: anywhere; }
    .ability p { margin: 12px 0 0; font-size: .9rem; font-weight: 720; overflow-wrap: anywhere; }

    .case-grid {
      display: grid;
      grid-template-columns: repeat(12, minmax(0, 1fr));
      gap: 0;
      background: var(--ink);
    }

    .case-card {
      position: relative;
      min-width: 0;
      min-height: 320px;
      margin: 0;
      border-width: 0 3px 3px 0;
      padding: 22px;
      overflow: hidden;
    }

    .case-card::before {
      content: attr(data-case);
      position: absolute;
      right: 14px;
      top: 8px;
      color: rgba(17, 17, 17, .08);
      font-size: 7.6rem;
      line-height: 1;
      font-weight: 950;
    }

    .case-card.feature { grid-column: span 6; min-height: 430px; }
    .case-card.standard { grid-column: span 4; }
    .case-card.visual { background: var(--ink); color: var(--white); }
    .case-card.visual::before,
    .case-card.rag::before,
    .case-card.bubu::before { color: rgba(255, 253, 247, .12); }
    .case-card.moon { background: repeating-linear-gradient(135deg, rgba(17, 17, 17, .14) 0 10px, transparent 10px 20px), var(--lime); }
    .case-card.guang { background: var(--white); }
    .case-card.rag { background: var(--blue); color: var(--white); }
    .case-card.comsol { background: var(--sand); }
    .case-card.bubu { background: var(--red); color: var(--white); }
    .case-card > * { position: relative; z-index: 1; }
    .case-meta { color: currentColor; }
    .case-meta span { border: 2px solid currentColor; border-radius: var(--radius); padding: 3px 7px; background: rgba(255, 253, 247, .16); overflow-wrap: anywhere; }

    .case-card h3 {
      margin: 26px 0 0;
      max-width: 86%;
      font-size: 2.65rem;
      line-height: .96;
      font-weight: 950;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    .case-card.feature h3 { font-size: 3.6rem; }

    .case-points {
      display: grid;
      gap: 10px;
      margin: 22px 0 0;
      padding: 0;
      list-style: none;
    }

    .case-points li {
      display: grid;
      grid-template-columns: 28px minmax(0, 1fr);
      gap: 10px;
      align-items: start;
      font-size: .95rem;
      font-weight: 720;
      overflow-wrap: anywhere;
    }

    .case-points li::before {
      content: "";
      display: block;
      width: 18px;
      height: 18px;
      margin-top: 3px;
      border: 2px solid currentColor;
      background: currentColor;
      box-shadow: inset 0 0 0 5px rgba(255, 253, 247, .66);
    }

    .tag-row,
    .link-row { margin-top: 18px; }
    .case-link { background: rgba(255, 253, 247, .22); }
    .case-link:hover { background: var(--lime); color: var(--ink); }

    .signal-grid {
      display: grid;
      grid-template-columns: minmax(0, .92fr) minmax(0, 1.08fr);
      gap: 0;
    }

    .profile-panel {
      min-width: 0;
      border-right: 3px solid var(--ink);
      background: var(--ink);
      color: var(--white);
      padding: 26px;
    }

    .profile-panel h3,
    .list-panel h3 {
      margin: 0;
      font-size: 2.75rem;
      line-height: .95;
      letter-spacing: 0;
      text-transform: uppercase;
      overflow-wrap: anywhere;
    }

    .profile-block {
      margin-top: 22px;
      border: 3px solid var(--white);
      padding: 18px;
      background: rgba(255, 253, 247, .06);
    }

    .profile-block b { display: block; color: var(--lime); font-size: 1.4rem; line-height: 1.05; overflow-wrap: anywhere; }
    .profile-block p { margin: 12px 0 0; color: rgba(255, 253, 247, .78); font-weight: 720; overflow-wrap: anywhere; }

    .profile-meta {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 18px;
    }

    .profile-meta div {
      min-width: 0;
      border: 2px solid var(--white);
      padding: 12px;
      background: var(--white);
      color: var(--ink);
    }

    .profile-meta small {
      display: block;
      color: var(--muted);
      font-size: .7rem;
      font-weight: 950;
      text-transform: uppercase;
    }

    .profile-meta span { display: block; margin-top: 6px; font-size: .9rem; font-weight: 850; overflow-wrap: anywhere; }

    .list-panel {
      min-width: 0;
      padding: 26px;
      background: var(--white);
    }

    .award-list,
    .role-list {
      display: grid;
      gap: 10px;
      margin: 20px 0 0;
      padding: 0;
      list-style: none;
    }

    .award-list li,
    .role-list li {
      display: grid;
      grid-template-columns: 62px minmax(0, 1fr);
      min-width: 0;
      border: 2px solid var(--ink);
      background: var(--paper);
    }

    .award-list b,
    .role-list b {
      display: grid;
      place-items: center;
      min-height: 56px;
      border-right: 2px solid var(--ink);
      background: var(--red);
      color: var(--white);
      font-size: .82rem;
      line-height: 1;
      font-weight: 950;
    }

    .role-list b { background: var(--blue); }

    .award-list span,
    .role-list span {
      display: flex;
      align-items: center;
      min-width: 0;
      padding: 10px 12px;
      font-weight: 780;
      overflow-wrap: anywhere;
    }

    .role-list small { display: block; margin-top: 5px; color: var(--muted); font-weight: 850; }

    .footer {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(250px, auto);
      gap: 18px;
      margin-top: 18px;
      border: 3px solid var(--ink);
      background: var(--ink);
      color: var(--white);
      padding: 24px;
    }

    .footer h2 {
      margin: 0;
      max-width: 780px;
      color: var(--lime);
      font-size: 3.8rem;
      line-height: .9;
      letter-spacing: 0;
      text-transform: uppercase;
      overflow-wrap: anywhere;
    }

    .footer p { margin: 16px 0 0; max-width: 820px; color: rgba(255, 253, 247, .76); font-weight: 730; overflow-wrap: anywhere; }

    .footer-links {
      display: flex;
      flex-direction: column;
      gap: 10px;
      justify-content: flex-end;
    }

    .footer-links a {
      border: 2px solid var(--white);
      border-radius: var(--radius);
      padding: 11px 14px;
      font-size: .82rem;
      font-weight: 950;
      text-align: center;
      text-transform: uppercase;
    }

    .footer-links a:hover { background: var(--white); color: var(--ink); }
    .loading { border: 3px solid var(--ink); background: var(--white); padding: 24px; font-weight: 850; }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      .button { transition: none; }
    }

    @media (max-width: 1120px) {
      .hero,
      .signal-grid,
      .footer { grid-template-columns: 1fr; }
      .profile-panel { border-right: 0; border-bottom: 3px solid var(--ink); }
      .display-title { font-size: 6.2rem; }
      .case-card.feature,
      .case-card.standard { grid-column: span 6; }
    }

    @media (max-width: 880px) {
      .topbar,
      .section-head { grid-template-columns: 1fr; }
      .brand-link { border-right: 0; border-bottom: 3px solid var(--ink); }
      .nav { justify-content: flex-start; }
      .nav a {
        min-height: 46px;
        border-left: 0;
        border-right: 2px solid var(--ink);
        border-bottom: 2px solid var(--ink);
        flex: 1 1 auto;
      }
      .section-no {
        min-height: 78px;
        border-right: 0;
        border-bottom: 3px solid var(--ink);
        font-size: 2.4rem;
      }
      .section-note { border-left: 0; border-top: 3px solid var(--ink); }
      .capability-grid,
      .metric-strip { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .ability:nth-child(2) { border-right: 0; }
      .ability { border-bottom: 3px solid var(--ink); }
      .case-card.feature,
      .case-card.standard { grid-column: span 12; }
      .case-card { border-right: 0; }
    }

    @media (max-width: 620px) {
      .page { width: min(100% - 18px, var(--max)); padding-top: 9px; }
      .brand-link { grid-template-columns: 54px minmax(0, 1fr); }
      .brand-link b { font-size: 1.3rem; }
      .brand-link span,
      .nav a { font-size: .68rem; }
      .hero { min-height: auto; }
      .hero-copy { padding: 24px 16px; }
      .hero-poster::before { width: 150px; height: 90px; right: -36px; top: 74px; }
      .edition-row { grid-template-columns: 86px minmax(0, 1fr); }
      .edition-row span { padding: 10px; font-size: .68rem; }
      .display-title { font-size: 3.35rem; line-height: .9; }
      .display-title .outline { -webkit-text-stroke-width: 1px; text-shadow: 4px 4px 0 var(--red); }
      .statement { margin-top: 24px; border-left-width: 5px; padding-left: 12px; font-size: .98rem; }
      .hero-actions { display: grid; grid-template-columns: 1fr; }
      .button { width: 100%; min-width: 0; }
      .metric-strip,
      .capability-grid,
      .identity-top,
      .profile-meta { grid-template-columns: 1fr; }
      .metric { border-right: 0; border-bottom: 2px solid var(--white); }
      .metric:last-child { border-bottom: 0; }
      .identity-top div,
      .identity-top div:last-child,
      .ability,
      .ability:nth-child(2),
      .ability:nth-child(4) { border-right: 0; }
      .identity-top div { border-bottom: 3px solid var(--ink); }
      .identity-top div:last-child { border-bottom: 0; }
      .identity-system { padding: 18px; }
      .monogram { min-height: 220px; box-shadow: 8px 8px 0 var(--blue); }
      .monogram span { font-size: 4.6rem; }
      .section-title,
      .section-note,
      .profile-panel,
      .list-panel,
      .footer { padding: 18px; }
      .section-title h2,
      .footer h2 { font-size: 2.65rem; line-height: .94; }
      .case-card,
      .case-card.feature { min-height: 0; padding: 18px; }
      .case-card h3,
      .case-card.feature h3,
      .profile-panel h3,
      .list-panel h3 { max-width: 100%; font-size: 2rem; line-height: 1; }
      .case-card::before { font-size: 4.6rem; }
      .award-list li,
      .role-list li { grid-template-columns: 48px minmax(0, 1fr); }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="topbar" aria-label="页面导航">
      <a class="brand-link" href="../index.html" aria-label="返回主页">
        <b>04</b>
        <span>Graphic Designer Portfolio / Back to Index</span>
      </a>
      <nav class="nav" aria-label="变体导航">
        <a href="../index.html">Index</a>
        <a href="01-self-branding.html">V01</a>
        <a href="02-2021-identity.html">V02</a>
        <a href="03-2021-portfolio.html">V03</a>
        <a href="04-graphic-designer.html" aria-current="page">V04</a>
        <a href="05-naia-cv.html">V05</a>
        <a href="#work">Work</a>
        <a href="#cv">CV</a>
      </nav>
    </header>

    <main id="app" aria-live="polite">
      <div class="loading">Loading portfolio data...</div>
    </main>
  </div>

  <script src="../assets/resume-data.js"></script>
  <script>
    (() => {
      document.documentElement.dataset.resumeSource =
        window.resumeData && window.resumeData.person ? "shared-resume-data" : "static-fallback";
      const data = window.resumeData || {};
      const app = document.querySelector("#app");
      const text = (value, fallback = "") => String(value || fallback);
      const formatRoman = (name) => text(name, "JavonLoong").replace(/([a-z])([A-Z])/g, "$1 $2");
      const initials = (name) => formatRoman(name).split(/\s+/).map((part) => part[0]).join("").slice(0, 2).toUpperCase() || "JL";
      const projectText = (project) => [project?.name, project?.type, ...(project?.tags || []), ...(project?.points || [])].join(" ");
      const findProject = (...keys) => (data.aiProjects || []).find((project) => {
        const haystack = projectText(project).toLowerCase();
        return keys.some((key) => haystack.includes(String(key).toLowerCase()));
      });
      const linkBy = (...keys) => (data.links || []).find((link) => {
        const haystack = `${link.label} ${link.url}`.toLowerCase();
        return keys.some((key) => haystack.includes(String(key).toLowerCase()));
      });

      const projects = [
        { item: findProject("美育", "ppt", "视觉表达"), no: "01", theme: "visual", size: "feature", label: "Visual Direction" },
        { item: findProject("mooncake", "月饼", "three.js"), no: "02", theme: "moon", size: "feature", label: "3D Product Tool" },
        { item: findProject("guang", "知识网站", "内容系统"), no: "03", theme: "guang", size: "standard", label: "Knowledge Website" },
        { item: findProject("rag", "知识库", "graphrag"), no: "04", theme: "rag", size: "standard", label: "AI System" },
        { item: findProject("comsol", "awes", "仿真"), no: "05", theme: "comsol", size: "standard", label: "Simulation" },
        { item: findProject("步步", "伴学", "教育 ai"), no: "06", theme: "bubu", size: "standard", label: "Education Product" }
      ].filter((entry) => entry.item);

      const pdf = linkBy("pdf") || { label: "PDF 简历", url: "../resume/javon-ai-resume.pdf" };
      const github = linkBy("github");
      const moon = linkBy("mooncake", "月饼");
      const guang = linkBy("guang");
      document.title = `Variant 04 | ${text(data.person?.roman, "JavonLoong")} Graphic Designer Portfolio`;

      app.innerHTML = `
        <section class="hero" id="top" aria-labelledby="hero-title">
          <div class="hero-poster">
            <div class="edition-row"><span>Portfolio</span><span>Graphic Designer / Resume System / Variant 04</span></div>
            <div class="hero-copy">
              <div>
                <div class="eyebrow">
                  <span class="chip dark">${text(data.person?.title, "清华大学行健书院本科生")}</span>
                  <span class="chip red">${text(data.person?.period, "2024.09 - 2028.07")}</span>
                  <span class="chip">Visual Identity + Engineering Proof</span>
                </div>
                <h1 class="display-title" id="hero-title">${formatRoman(data.person?.roman)}<span class="outline">${text(data.person?.name, "纪文龙")}</span></h1>
                <p class="statement">${text(data.person?.statement, "把 AI、工程、产品和视觉表达做成可运行、可验证、可交付的作品系统。")}</p>
                <div class="hero-actions">
                  <a class="button primary" href="#work">View Work</a>
                  <a class="button" href="${pdf.url}">${pdf.label}</a>
                  <a class="button" href="../index.html">Back Index</a>
                </div>
              </div>
            </div>
            <div class="metric-strip" aria-label="关键证据">
              <div class="metric"><b>6098</b><span>动力装备资料页进入知识库处理链路。</span></div>
              <div class="metric"><b>593</b><span>RAG chunks 沉淀为可检索、可审计材料。</span></div>
              <div class="metric"><b>42</b><span>AWES / COMSOL case 用仿真闭环说话。</span></div>
              <div class="metric"><b>204h</b><span>志愿公益和公众讲解形成长期行动记录。</span></div>
            </div>
          </div>

          <aside class="identity-board" aria-label="视觉身份板">
            <div class="identity-top">
              <div><small>Positioning</small><strong>${text(data.person?.positioning, "AI 应用工程 / 产品原型 / 视觉表达")}</strong></div>
              <div><small>Program</small><strong>${text(data.person?.program, "理论与应用力学 + 能源与动力工程双学位")}</strong></div>
            </div>
            <div class="identity-system">
              <small>Identity System</small>
              <div class="monogram" aria-hidden="true"><span>${initials(data.person?.roman).slice(0, 1)}</span><span>${initials(data.person?.roman).slice(1, 2) || "L"}</span></div>
              <p class="identity-caption">这版把简历当作作品集处理：项目是 case，奖项是 proof，能力是 visual system，整体保持高密度但不做装饰堆叠。</p>
            </div>
            <div class="palette" aria-hidden="true"><span></span><span></span><span></span><span></span></div>
          </aside>
        </section>

        <section class="section" aria-labelledby="system-title">
          <div class="section-head">
            <div class="section-no">01</div>
            <div class="section-title"><span class="section-kicker">Visual Identity / Capability</span><h2 id="system-title">Design-Led Resume</h2></div>
            <div class="section-note">把 AI 工程、仿真、产品和视觉表达放进同一个版式系统里，让“能做事”和“会表达”同时可见。</div>
          </div>
          <div class="capability-grid">
            ${(data.abilities || []).map((ability, index) => `
              <article class="ability"><b>${String(index + 1).padStart(2, "0")}</b><strong>${text(ability.title)}</strong><p>${text(ability.text)}</p></article>
            `).join("")}
          </div>
        </section>

        <section class="section" id="work" aria-labelledby="work-title">
          <div class="section-head">
            <div class="section-no">02</div>
            <div class="section-title"><span class="section-kicker">Portfolio Cases / Selected Works</span><h2 id="work-title">Work Index</h2></div>
            <div class="section-note">前排强化视觉表达、美育 PPT、MoonCake 3D 和 Guang 网站；RAG、COMSOL、步步作为工程与产品证据保留在同一作品墙。</div>
          </div>
          <div class="case-grid">
            ${projects.map((entry) => `
              <article class="case-card ${entry.theme} ${entry.size}" data-case="${entry.no}">
                <div class="case-meta"><span>${entry.label}</span><span>${text(entry.item.type, "Project")}</span></div>
                <h3>${text(entry.item.name)}</h3>
                <ul class="case-points">${(entry.item.points || []).slice(0, 2).map((point) => `<li>${text(point)}</li>`).join("")}</ul>
                <div class="tag-row">${(entry.item.tags || []).slice(0, 4).map((tag) => `<span class="tag">${text(tag)}</span>`).join("")}</div>
                ${entry.item.links ? `<div class="link-row">${entry.item.links.map((link) => `<a class="case-link" href="${link.url}">${text(link.label)}</a>`).join("")}</div>` : ""}
              </article>
            `).join("")}
          </div>
        </section>

        <section class="section" id="cv" aria-labelledby="cv-title">
          <div class="section-head">
            <div class="section-no">03</div>
            <div class="section-title"><span class="section-kicker">CV Signals / Proof Wall</span><h2 id="cv-title">Resume Layer</h2></div>
            <div class="section-note">作品集语气之外，保留教育背景、奖项、组织与实践经历，方便快速判断履历可信度。</div>
          </div>
          <div class="signal-grid">
            <aside class="profile-panel">
              <h3>${text(data.person?.title, "Profile")}</h3>
              <div class="profile-block"><b>${text(data.person?.program, "Program")}</b><p>${text(data.person?.positioning, "Positioning")}</p></div>
              <div class="profile-meta">
                <div><small>Name</small><span>${text(data.person?.name)} / ${formatRoman(data.person?.roman)}</span></div>
                <div><small>Period</small><span>${text(data.person?.period)}</span></div>
                <div><small>Coursework</small><span>${text(data.person?.coursework, "已修读课程 24 门，其中必修课 17 门")}</span></div>
                <div><small>Role Fit</small><span>资料调研 / 文案整合 / 路演辅助 / 人员协调</span></div>
                <div><small>PDF</small><span>${pdf.label}</span></div>
                <div><small>Links</small><span>${[github, moon, guang].filter(Boolean).map((item) => item.label).join(" / ") || "Project links"}</span></div>
              </div>
            </aside>
            <div class="list-panel">
              <h3>Honors / Practice</h3>
              <ul class="award-list" aria-label="奖项">${(data.awards || []).slice(0, 8).map((award, index) => `<li><b>${String(index + 1).padStart(2, "0")}</b><span>${text(award)}</span></li>`).join("")}</ul>
              <ul class="role-list" aria-label="经历">${[...(data.leadership || []), ...(data.practice || [])].slice(0, 7).map((role, index) => `<li><b>${String(index + 1).padStart(2, "0")}</b><span>${text(role.name || role.role)}<small>${text(role.period)}${role.name && role.role ? ` / ${text(role.role)}` : ""}</small></span></li>`).join("")}</ul>
            </div>
          </div>
        </section>

        <footer class="footer">
          <div><h2>Make The Work Visible.</h2><p>Variant 04 用 graphic designer portfolio 的语言组织真实简历数据：强排版、章节编号、身份系统、作品 case 和 CV proof 同屏共存。</p></div>
          <div class="footer-links">
            ${github ? `<a href="${github.url}">${github.label}</a>` : ""}
            ${moon ? `<a href="${moon.url}">${moon.label}</a>` : ""}
            ${guang ? `<a href="${guang.url}">${guang.label}</a>` : ""}
            <a href="${pdf.url}">${pdf.label}</a>
            <a href="#top">Top</a>
          </div>
        </footer>
      `;
    })();
  </script>
</body>
</html>
